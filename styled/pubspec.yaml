name: styled
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.2.1
  supabase_flutter: ^2.12.0
  google_fonts: ^6.2.1 #Google fonts for letters
  cupertino_icons: ^1.0.2 #The following adds the Cupertino icons to your application, Use with the CupertinoIcons class for iOs style icons 
  flutter_colorpicker: ^1.1.0 
  fl_chart: ^1.2.0
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4


flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png" #App Logo Implemented, image stored in assets
